appId: com.jpmatamorosp.vue-electron-app
productName: Vue Electron App
directories:
  output: dist_electron
files:
  - dist/**/*
  - main/**/*
  - node_modules/**/*
  - package.json
win:
  target:
    - target: nsis
      arch:
        - x64
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: '${productName}-${version}-${os}-macos-${arch}.${ext}'
publish:
  provider: github
  owner: jpmatamorosp
  repo: vue-electron-app
  releaseType: release



